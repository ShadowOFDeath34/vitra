name: vitra
description: "Vitra — AI-powered wellness tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_analytics: ^11.4.5
  firebase_crashlytics: ^4.3.5

  # Image & Barcode
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  mobile_scanner: ^6.0.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  confetti: ^0.7.0

  # HTTP
  dio: ^5.8.0+1

  # AI
  flutter_dotenv: ^5.2.1

  # Auth
  google_sign_in: ^6.2.2

  # Premium / IAP
  purchases_flutter: ^9.15.1

  # Ads (ücretsiz kullanıcı geliri)
  google_mobile_ads: ^5.3.0

  # Utilities
  shared_preferences: ^2.3.5

  # Font
  google_fonts: ^6.2.1
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  generate: true

  assets:
    - .env
